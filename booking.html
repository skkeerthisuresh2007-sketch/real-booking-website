<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>


     <body class="booking-page">

<h1>Book Your Ticket 🎫</h1>

<form id="ticketForm">

<h1 style="text-align:center;">Book Ticket</h1>

<form id="ticketForm" style="text-align:center;">
    <select id="transportType">
        <option value="bus">Bus</option>
        <option value="train">Train</option>
        <option value="flight">Flight</option>
    </select><br><br>

    <input type="text" id="from" placeholder="From"><br><br>
    <input type="text" id="to" placeholder="To"><br><br>
    <input type="number" id="seats" value="1"><br><br>

    <button type="submit">Search</button>
   
</form>

<div id="vehicleList"></div>

<script src="script.js"></script>

</body>
</html>
